<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 容器 */
.container {
  text-align: center;
}

/* 禮物盒 */
.gift-box {
  width: 160px;
  height: 160px;
  background: #ef4444;
  margin: auto;
  position: relative;
  border-radius: 20px;
  cursor: pointer;
  transition: transform 0.4s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.gift-box:hover {
  transform: scale(1.05);
}

/* 蝴蝶結 */
.ribbon {
  position: absolute;
  width: 100%;
  height: 20px;
  background: gold;
  top: 50%;
  transform: translateY(-50%);
}

.ribbon::before {
  content: "";
  position: absolute;
  width: 20px;
  height: 100%;
  background: gold;
  left: 50%;
  transform: translateX(-50%);
}

/* 開箱動畫 */
.open {
  animation: openBox 0.8s forwards;
}

@keyframes openBox {
  0% { transform: scale(1); }
  100% { transform: scale(0) rotate(720deg); opacity: 0; }
}

/* 活動區 */
.activities {
  display: none;
  margin-top: 30px;
  gap: 20px;
}

.activity-card {
  background: white;
  color: #111;
  padding: 20px;
  border-radius: 15px;
  width: 220px;
  display: inline-block;
  margin: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}

.activity-card:hover {
  transform: translateY(-5px);
}

.title {
  margin-bottom: 20px;
  font-size: 22px;
  font-weight: bold;
  color: #facc15;
}
</style>
</head>

<body>

<div class="container">

  <div id="gift" class="gift-box" onclick="openGift()">
    <div class="ribbon"></div>
  </div>

  <div id="activities" class="activities">
    <div class="title">🎉 三場活動等你選擇</div>

    <div class="activity-card">
      <h3>半導體產業講座</h3>
      <p>了解全球最熱門產業趨勢</p>
    </div>

    <div class="activity-card">
      <h3>企業徵才說明會</h3>
      <p>直接與企業 HR 面對面</p>
    </div>

    <div class="activity-card">
      <h3>職涯探索工作坊</h3>
      <p>幫助你找到未來方向</p>
    </div>
  </div>

</div>

<script>
function openGift() {
  const gift = document.getElementById("gift");
  const activities = document.getElementById("activities");

  gift.classList.add("open");

  setTimeout(() => {
    gift.style.display = "none";
    activities.style.display = "block";
  }, 700);
}
</script>

</body>
</html>
