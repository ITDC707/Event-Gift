<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱 - 修正版</title>

<style>
  body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  /* --- 禮物盒本體 --- */
  .gift-box {
    width: 160px;
    height: 160px;
    background: #ef4444; 
    margin: auto;
    position: relative; /* 關鍵：讓子元素相對定位 */
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
    /* 移除 overflow: hidden 否則蝴蝶結會被切掉 */
  }

  .gift-box:hover {
    transform: translateY(-5px) scale(1.05);
  }

  /* --- 絲帶與蝴蝶結 (強制顯示) --- */
  
  /* 垂直絲帶 */
  .ribbon-v {
    position: absolute;
    width: 30px;
    height: 100%;
    background: #facc15;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2; /* 確保在盒子上方 */
  }

  /* 水平絲帶 */
  .ribbon-h {
    position: absolute;
    width: 100%;
    height: 30px;
    top: 50%;
    transform: translateY(-50%);
    background: #facc15;
    z-index: 1; 
  }

  /* 蝴蝶結容器 */
  .bow {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 40px;
    z-index: 10; /* 最高層級 */
  }

  /* 蝴蝶結左右圈圈 */
  .bow::before, .bow::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    background: #facc15;
    border-radius: 50% 50% 0 50%;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .bow::before { left: 0; transform: rotate(-15deg); }
  .bow::after { right: 0; transform: rotate(105deg) scaleX(-1); }

  /* 蝴蝶結中心 */
  .bow-center {
    position: absolute;
    width: 25px;
    height: 25px;
    background: #eab308;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 11;
  }

  /* --- 動畫與其他內容 --- */
  .open {
    animation: openBox 0.8s forwards ease-in-out;
  }

  @keyframes openBox {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  .activities {
    display: none;
    margin-top: 20px;
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .activity-card {
    background: white;
    color: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 180px;
    display: inline-block;
    margin: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .title { margin-bottom: 20px; font-size: 24px; color: #facc15; }
</style>
</head>

<body>

<div class="container">
  <div id="gift" class="gift-box" onclick="openGift()">
    <div class="bow">
      <div class="bow-center"></div>
    </div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
  </div>

  <div id="activities" class="activities">
    <div class="title">🎉 三場精彩活動</div>
    <div class="activity-card"><h3>產業講座</h3><p>趨勢分析</p></div>
    <div class="activity-card"><h3>徵才說明</h3><p>HR 面對面</p></div>
    <div class="activity-card"><h3>職涯工作坊</h3><p>找到方向</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
function openGift() {
  const gift = document.getElementById("gift");
  const activities = document.getElementById("activities");

  gift.classList.add("open");
  confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

  setTimeout(() => {
    gift.style.display = "none";
    activities.style.display = "block";
  }, 600);
}
</script>

</body>
</html>
