<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱 - 大禮物版</title>

<style>
  body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  /* --- 禮物盒本體 (放大版) --- */
  .gift-box {
    width: 240px;  /* 從 160px 放大 */
    height: 240px; /* 從 160px 放大 */
    background: #ef4444; 
    margin: auto;
    position: relative;
    border-radius: 30px; /* 圓角也稍微加大更可愛 */
    cursor: pointer;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .gift-box:hover {
    transform: translateY(-10px) scale(1.05);
  }

  /* --- 絲帶與蝴蝶結 (等比例放大) --- */
  
  /* 垂直絲帶 */
  .ribbon-v {
    position: absolute;
    width: 45px; /* 寬度加大 */
    height: 100%;
    background: #facc15;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
  }

  /* 水平絲帶 */
  .ribbon-h {
    position: absolute;
    width: 100%;
    height: 45px; /* 高度加大 */
    top: 50%;
    transform: translateY(-50%);
    background: #facc15;
    z-index: 1; 
  }

  /* 蝴蝶結容器 */
  .bow {
    position: absolute;
    top: -40px; /* 向上偏移更多 */
    left: 50%;
    transform: translateX(-50%);
    width: 120px; /* 蝴蝶結變寬 */
    height: 60px;
    z-index: 10;
  }

  /* 蝴蝶結左右圈圈 */
  .bow::before, .bow::after {
    content: "";
    position: absolute;
    width: 70px; /* 圈圈變大 */
    height: 70px;
    background: #facc15;
    border-radius: 50% 50% 0 50%;
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }

  .bow::before { left: 0; transform: rotate(-15deg); }
  .bow::after { right: 0; transform: rotate(105deg) scaleX(-1); }

  /* 蝴蝶結中心 */
  .bow-center {
    position: absolute;
    width: 35px; /* 中心結變大 */
    height: 35px;
    background: #eab308;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 11;
  }

  /* --- 動畫設定 --- */
  .open {
    animation: openBox 0.8s forwards ease-in-out;
  }

  @keyframes openBox {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  /* 活動卡片顯示區 */
  .activities {
    display: none;
    margin-top: 20px;
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .activity-card {
    background: white;
    color: #1e293b;
    padding: 25px;
    border-radius: 20px;
    width: 200px;
    display: inline-block;
    margin: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .title { 
    margin-bottom: 30px; 
    font-size: 28px; 
    color: #facc15;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="container">
  <div id="gift" class="gift-box" onclick="openGift()">
    <div class="bow">
      <div class="bow-center"></div>
    </div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
  </div>

  <div id="activities" class="activities">
    <div class="title">🎉 專屬活動推薦</div>
    <div class="activity-card"><h3>產業講座</h3><p>科技趨勢解密</p></div>
    <div class="activity-card"><h3>徵才說明</h3><p>企業實習機會</p></div>
    <div class="activity-card"><h3>職涯工作坊</h3><p>探索個人特質</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
function openGift() {
  const gift = document.getElementById("gift");
  const activities = document.getElementById("activities");

  gift.classList.add("open");
  
  // 灑花效果
  confetti({ 
    particleCount: 200, 
    spread: 100, 
    origin: { y: 0.6 },
    colors: ['#ef4444', '#facc15', '#ffffff']
  });

  setTimeout(() => {
    gift.style.display = "none";
    activities.style.display = "block";
  }, 700);
}
</script>

</body>
</html>
