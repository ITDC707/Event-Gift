<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱 - 宣傳頁面</title>

<style>
  body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* 容器 */
  .container {
    text-align: center;
    perspective: 1000px;
  }

  /* --- 禮物盒樣式 --- */
  .gift-box {
    width: 160px;
    height: 160px;
    background: #ef4444; /* 質感紅 */
    margin: auto;
    position: relative;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
  }

  .gift-box:hover {
    transform: translateY(-5px) rotate(2deg) scale(1.05);
  }

  /* 十字絲帶 */
  .ribbon-v, .ribbon-h {
    position: absolute;
    background: #facc15; /* 金色 */
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .ribbon-v {
    width: 30px;
    height: 100%;
    left: 50%;
    transform: translateX(-50%);
  }

  .ribbon-h {
    width: 100%;
    height: 30px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* 蝴蝶結 */
  .bow {
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 40px;
    z-index: 10;
  }

  .bow::before, .bow::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    background: #facc15;
    border-radius: 50% 50% 0 50%;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .bow::before { left: 0; transform: rotate(-15deg); }
  .bow::after { right: 0; transform: rotate(105deg) scaleX(-1); }

  .bow-center {
    position: absolute;
    width: 25px;
    height: 25px;
    background: #eab308;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 11;
  }

  /* --- 動畫效果 --- */
  .open {
    animation: openBox 1s forwards ease-in-out;
  }

  @keyframes openBox {
    0% { transform: scale(1); opacity: 1; }
    20% { transform: scale(1.1) rotate(-5deg); }
    100% { transform: scale(0) rotate(720deg); opacity: 0; }
  }

  /* 活動卡片區 */
  .activities {
    display: none;
    margin-top: 20px;
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .title {
    margin-bottom: 30px;
    font-size: 26px;
    font-weight: bold;
    color: #facc15;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }

  .activity-card {
    background: white;
    color: #1e293b;
    padding: 25px;
    border-radius: 20px;
    width: 200px;
    display: inline-block;
    margin: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    border: 2px solid transparent;
  }

  .activity-card:hover {
    transform: translateY(-10px);
    border-color: #facc15;
  }

  .activity-card h3 {
    margin-top: 0;
    color: #ef4444;
  }

  .activity-card p {
    font-size: 14px;
    line-height: 1.5;
  }
</style>
</head>

<body>

<div class="container">
  <div id="gift" class="gift-box" onclick="openGift()">
    <div class="bow">
      <div class="bow-center"></div>
    </div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
  </div>

  <div id="activities" class="activities">
    <div class="title">🎉 專屬活動為你開啟</div>

    <div class="activity-card">
      <h3>半導體產業講座</h3>
      <p>解析台積電與全球供應鏈趨勢，掌握半導體未來十年發展。</p>
    </div>

    <div class="activity-card">
      <h3>企業徵才說明會</h3>
      <p>與頂尖科技企業 HR 面對面，了解實習職缺與職涯路徑。</p>
    </div>

    <div class="activity-card">
      <h3>職涯探索工作坊</h3>
      <p>透過專業測驗與導師指導，精準鎖定你的職涯賽道。</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function openGift() {
  const gift = document.getElementById("gift");
  const activities = document.getElementById("activities");

  // 1. 啟動開箱動畫
  gift.classList.add("open");

  // 2. 灑紙花特效
  confetti({
    particleCount: 150,
    spread: 70,
    origin: { y: 0.6 },
    colors: ['#ef4444', '#facc15', '#ffffff']
  });

  // 3. 顯示活動內容 (延遲時間與動畫同步)
  setTimeout(() => {
    gift.style.display = "none";
    activities.style.display = "block";
  }, 700);
}
</script>

</body>
</html>
