<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱 - 超巨大禮物版</title>

<style>
  body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  /* --- 超巨大禮物盒 (480px) --- */
  .gift-box {
    width: 480px;  /* 寬度放大 2 倍 */
    height: 480px; /* 高度放大 2 倍 */
    background: #ef4444; 
    margin: auto;
    position: relative;
    border-radius: 60px; /* 圓角隨之加大 */
    cursor: pointer;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 5;
  }

  .gift-box:hover {
    transform: translateY(-20px) scale(1.02);
  }

  /* --- 絲帶與蝴蝶結 (等比例放大 2 倍) --- */
  
  .ribbon-v {
    position: absolute;
    width: 90px; /* 絲帶寬度 45 -> 90 */
    height: 100%;
    background: #facc15;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
  }

  .ribbon-h {
    position: absolute;
    width: 100%;
    height: 90px; /* 絲帶高度 45 -> 90 */
    top: 50%;
    transform: translateY(-50%);
    background: #facc15;
    z-index: 1; 
  }

  .bow {
    position: absolute;
    top: -80px; /* 偏移量加倍 */
    left: 50%;
    transform: translateX(-50%);
    width: 240px; /* 寬度 120 -> 240 */
    height: 120px;
    z-index: 10;
  }

  .bow::before, .bow::after {
    content: "";
    position: absolute;
    width: 140px; /* 圈圈 70 -> 140 */
    height: 140px;
    background: #facc15;
    border-radius: 50% 50% 0 50%;
    box-shadow: 0 12px 24px rgba(0,0,0,0.3);
  }

  .bow::before { left: 0; transform: rotate(-15deg); }
  .bow::after { right: 0; transform: rotate(105deg) scaleX(-1); }

  .bow-center {
    position: absolute;
    width: 70px; /* 中心結 35 -> 70 */
    height: 70px;
    background: #eab308;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 11;
  }

  /* --- 動畫 --- */
  .open {
    animation: openBox 1s forwards ease-in-out;
  }

  @keyframes openBox {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  .activities {
    display: none;
    margin-top: 20px;
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .title { 
    font-size: 36px; 
    color: #facc15;
    margin-bottom: 40px;
  }

  .activity-card {
    background: white;
    color: #1e293b;
    padding: 30px;
    border-radius: 25px;
    width: 250px;
    display: inline-block;
    margin: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  }
</style>
</head>

<body>

<div class="container">
  <div id="gift" class="gift-box" onclick="openGift()">
    <div class="bow">
      <div class="bow-center"></div>
    </div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
  </div>

  <div id="activities" class="activities">
    <div class="title">🎉 專屬活動推薦</div>
    <div class="activity-card"><h3>日月光半導體製造股份有限公司說明會</h3><p>走進晶片世界，掌握科技未來</p></div>
    <div class="activity-card"><h3>跨領域人才職涯發展座談會</h3><p>跨出領域界線，開啟無限職涯可能</p></div>
    <div class="activity-card"><h3>2026臺大國際人才就業媒合會</h3><p>從校園出發，接軌全球舞台</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
function openGift() {
  const gift = document.getElementById("gift");
  const activities = document.getElementById("activities");

  gift.classList.add("open");
  
  // 增加紙花噴發量與範圍以匹配巨大盒子
  confetti({ 
    particleCount: 400, 
    spread: 160, 
    origin: { y: 0.5 },
    scalar: 1.2
  });

  setTimeout(() => {
    gift.style.display = "none";
    activities.style.display = "block";
  }, 800);
}
</script>

</body>
</html>
