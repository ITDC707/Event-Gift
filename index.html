<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱 - 國際生主題版</title>

<style>
  /* --- 基礎背景設定 --- */
  body {
    margin: 0;
    font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
    background: #0f172a; /* 深藍底色 */
    background-image: 
      radial-gradient(circle at 20% 30%, rgba(30, 41, 59, 0.5) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(30, 41, 59, 0.5) 0%, transparent 50%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* --- 質感花邊：動態飛機與裝飾 --- */
  body::before {
    content: "✈"; /* 飛機符號 */
    position: absolute;
    top: 10%;
    left: -50px;
    font-size: 40px;
    color: rgba(255, 255, 255, 0.1);
    animation: fly 15s linear infinite;
    z-index: 0;
  }

  @keyframes fly {
    0% { transform: translateX(0) translateY(0) rotate(20deg); opacity: 0; }
    10% { opacity: 0.2; }
    90% { opacity: 0.2; }
    100% { transform: translateX(120vw) translateY(20vh) rotate(20deg); opacity: 0; }
  }

  /* 背景浮水印：地球圖示 */
  .bg-icon {
    position: absolute;
    font-size: 200px;
    color: rgba(255, 255, 255, 0.03);
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }
  .icon-left { top: 10%; left: 5%; transform: rotate(-15deg); }
  .icon-right { bottom: 10%; right: 5%; transform: rotate(15deg); }

  .container {
    text-align: center;
    max-width: 1200px;
    position: relative;
    z-index: 1; /* 確保內容在背景裝飾上方 */
  }

  /* --- 禮物盒設定 --- */
  .gift-box {
    width: 350px;
    height: 350px;
    background: #ef4444; 
    margin: 40px auto;
    position: relative;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    transition: transform 0.3s ease;
  }
  .ribbon-v { position: absolute; width: 70px; height: 100%; background: #facc15; left: 50%; transform: translateX(-50%); z-index: 2; }
  .ribbon-h { position: absolute; width: 100%; height: 70px; top: 50%; transform: translateY(-50%); background: #facc15; z-index: 1; }
  .bow { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 200px; height: 100px; z-index: 10; }
  .bow::before, .bow::after { content: ""; position: absolute; width: 120px; height: 120px; background: #facc15; border-radius: 50% 50% 0 50%; }
  .bow::before { left: 0; transform: rotate(-15deg); }
  .bow::after { right: 0; transform: rotate(105deg) scaleX(-1); }
  .bow-center { position: absolute; width: 50px; height: 50px; background: #eab308; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 11; }

  .open { animation: openBox 1s forwards ease-in-out; }
  @keyframes openBox { 0% { transform: scale(1); } 100% { transform: scale(0) rotate(360deg); opacity: 0; } }

  /* --- 活動顯示區 --- */
  .activities {
    display: none;
    animation: fadeIn 0.8s ease forwards;
  }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

  .title { font-size: 32px; color: #facc15; margin-bottom: 35px; font-weight: bold; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }

  /* --- 三色邊框 + 文字置中卡片 --- */
  .activity-card {
    background: white; 
    color: #1e293b;
    padding: 30px 25px;
    border-radius: 35px;
    width: 320px;
    min-height: 350px;
    display: inline-flex;
    flex-direction: column;
    justify-content: center; 
    align-items: center;     
    text-align: center;      
    vertical-align: top;
    margin: 15px;
    
    border: 4px solid #facc15; 
    box-shadow: 
      0 0 0 6px white,           
      0 20px 50px rgba(0,0,0,0.5); 
    
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-sizing: border-box;
    position: relative;
  }
  .activity-card:hover { transform: translateY(-15px); }

  .event-date {
    font-size: 16px;
    color: #94a3b8;
    margin-bottom: 15px;
    font-weight: 600;
    letter-spacing: 1px;
  }

    font-size: 20px;
    margin
