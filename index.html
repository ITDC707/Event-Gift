<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱 - 統一規格版</title>

<style>
  body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  /* --- 巨大禮物盒設定 --- */
  .gift-box {
    width: 480px;
    height: 480px;
    background: #ef4444; 
    margin: auto;
    position: relative;
    border-radius: 60px;
    cursor: pointer;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    transition: transform 0.3s ease;
  }

  .ribbon-v { position: absolute; width: 90px; height: 100%; background: #facc15; left: 50%; transform: translateX(-50%); z-index: 2; }
  .ribbon-h { position: absolute; width: 100%; height: 90px; top: 50%; transform: translateY(-50%); background: #facc15; z-index: 1; }
  .bow { position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 240px; height: 120px; z-index: 10; }
  .bow::before, .bow::after { content: ""; position: absolute; width: 140px; height: 140px; background: #facc15; border-radius: 50% 50% 0 50%; }
  .bow::before { left: 0; transform: rotate(-15deg); }
  .bow::after { right: 0; transform: rotate(105deg) scaleX(-1); }
  .bow-center { position: absolute; width: 70px; height: 70px; background: #eab308; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 11; }

  /* --- 開箱動畫 --- */
  .open { animation: openBox 1s forwards ease-in-out; }
  @keyframes openBox { 0% { transform: scale(1); } 100% { transform: scale(0) rotate(360deg); opacity: 0; } }

  /* --- 活動顯示區 --- */
  .activities {
    display: none;
    margin-top: 20px;
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

  .title { font-size: 45px; color: #facc15; margin-bottom: 50px; font-weight: bold; }

  /* --- 關鍵：統一大小的卡片 --- */
  .activity-card {
    background: white;
    color: #1e293b;
    padding: 30px;
    border-radius: 25px;
    width: 280px;       /* 增加寬度以容納長文字 */
    height: 220px;      /* 固定高度，確保框框一樣大 */
    display: inline-flex;
    flex-direction: column;
    justify-content: center;
    vertical-align: top;
    margin: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    transition: transform 0.3s;
  }

  .activity-card:hover { transform: translateY(-10px); }

  /* 日期樣式 */
  .event-date {
    font-size: 20px;
    color: #64748b;
    margin-bottom: 14px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .activity-card h3 {
    font-size: 24px;
    margin: 0 0 15px 0;
    color: #ef4444;
    line-height: 1.3;
  }

  .activity-card p {
    font-size: 18px;
    margin: 0;
    color: #475569;
    line-height: 1.6;
  }
</style>
</head>

<body>

<div class="container">
  <div id="gift" class="gift-box" onclick="openGift()">
    <div class="bow"><div class="bow-center"></div></div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
  </div>

  <div id="activities" class="activities">
    <div class="title">🎉 專屬活動推薦</div>
    
    <div class="activity-card">
      <div class="event-date">2026 / 05 / 15</div>
      <h3>日月光半導體製造股份有限公司說明會</h3>
      <p>走進晶片世界，掌握科技未來</p>
    </div>

    <div class="activity-card">
      <div class="event-date">2026 / 05 / 20</div>
      <h3>跨領域人才職涯發展座談會</h3>
      <p>跨出領域界線，開啟無限職涯可能</p>
    </div>

    <div class="activity-card">
      <div class="event-date">2026 / 05 / 28</div>
      <h3>2026 臺大國際人才就業媒合會</h3>
      <p>從校園出發，接軌全球舞台</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
function openGift() {
  const gift = document.getElementById("gift");
  const activities = document.getElementById("activities");
  gift.classList.add("open");
  confetti({ particleCount: 400, spread: 160, origin: { y: 0.5 }, scalar: 1.2 });
  setTimeout(() => {
    gift.style.display = "none";
    activities.style.display = "block";
  }, 800);
}
</script>

</body>
</html>
