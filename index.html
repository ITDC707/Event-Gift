<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱 - 國際生主題最終版</title>

<style>
  /* --- 基礎背景設定 --- */
  body {
    margin: 0;
    font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
    background-color: #0f172a;
    /* 漸層營造天空感 */
    background-image: 
      radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* --- 質感花邊背景裝飾 --- */
  .bg-decor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* 確保裝飾不影響點擊禮物 */
    z-index: 0;
  }

  /* 漂浮的飛機 */
  .plane {
    position: absolute;
    font-size: 40px;
    opacity: 0.15;
    animation: flight 20s linear infinite;
  }

  @keyframes flight {
    0% { transform: translate(-10vw, 20vh) rotate(15deg); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    100% { transform: translate(110vw, -10vh) rotate(15deg); opacity: 0; }
  }

  /* 兩側的國際元素浮水印 */
  .globe { position: absolute; left: 5%; top: 15%; font-size: 150px; opacity: 0.05; transform: rotate(-20deg); }
  .map { position: absolute; right: 5%; bottom: 10%; font-size: 180px; opacity: 0.05; transform: rotate(15deg); }

  /* --- 內容容器 --- */
  .container {
    text-align: center;
    max-width: 1200px;
    z-index: 10; /* 確保在裝飾之上 */
    position: relative;
  }

  /* --- 禮物盒設定 --- */
  .gift-box {
    width: 300px;
    height: 300px;
    background: #ef4444; 
    margin: 40px auto;
    position: relative;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    transition: transform 0.3s ease;
  }

  .ribbon-v { position: absolute; width: 60px; height: 100%; background: #facc15; left: 50%; transform: translateX(-50%); z-index: 2; }
  .ribbon-h { position: absolute; width: 100%; height: 60px; top: 50%; transform: translateY(-50%); background: #facc15; z-index: 1; }
  
  .open { animation: openBox 0.8s forwards; }
  @keyframes openBox {
    0% { transform: scale(1); }
    100% { transform: scale(0) rotate(720deg); opacity: 0; }
  }

  /* --- 活動推薦區 --- */
  .activities {
    display: none;
    animation: fadeIn 0.8s ease forwards;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .title { font-size: 32px; color: #facc15; margin-bottom: 40px; font-weight: bold; }

  /* --- 置中卡片 + 三色邊框 --- */
  .activity-card {
    background: white; 
    color: #1e293b;
    padding: 30px 20px;
    border-radius: 35px;
    width: 320px;
    min-height: 350px;
    display: inline-flex;
    flex-direction: column;
    justify-content: center; 
    align-items: center;     
    text-align: center;      
    vertical-align: top;
    margin: 15px;
    
    /* 白色-黃色-白色邊框設計 */
    border: 4px solid #facc15; 
    box-shadow: 
      0 0 0 6px white,           
      0 15px 40px rgba(0,0,0,0.5); 
    
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-sizing: border-box;
  }

  .activity-card:hover { transform: translateY(-15px) scale(1.03); }

  .event-date { font-size: 16px; color: #94a3b8; margin-bottom: 15px; font-weight: 600; }
  .activity-card h3 { font-size: 20px; margin: 0 0 15px 0; color: #ef4444; line-height: 1.4; font-weight: bold; }
  .activity-card p { font-size: 15px; color: #475569; line-height: 1.6; margin: 0; }

</style>
</head>

<body>

  <div class="bg-decor">
    <div class="plane">✈️</div>
    <div class="globe">🌍</div>
    <div class="map">🗺️</div>
  </div>

  <div class="container">
    <div id="gift" class="gift-box" onclick="openGift()">
      <div class="ribbon-v"></div>
      <div class="ribbon-h"></div>
    </div>

    <div id="activities" class="activities">
      <div class="title">🌍 國際生專屬活動推薦</div>
      
      <div class="activity-card">
        <div class="event-date">2026 / 05 / 15</div>
        <h3>日月光半導體說明會<br>ASE Company Session</h3>
        <p>走進晶片世界，掌握科技未來。<br>Step into the world of chips.</p>
      </div>

      <div class="activity-card">
        <div class="event-date">2026 / 05 / 20</div>
        <h3>跨領域人才座談會<br>Career Seminar</h3>
        <p>跨出領域界線，開啟無限可能。<br>Unlock endless career possibilities.</p>
      </div>

      <div class="activity-card">
        <div class="event-date">2026 / 05 / 28</div>
        <h3>2026 臺大國際人才媒合會<br>NTU Career Fair</h3>
        <p>從校園出發，接軌全球舞台。<br>Connect with the global stage.</p>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
function openGift() {
  const gift = document.getElementById("gift");
  const activities = document.getElementById("activities");
  gift.classList.add("open");
  
  // 噴出各國國旗色彩的紙屑
  confetti({ 
    particleCount: 400, 
    spread: 100, 
    origin: { y: 0.6 },
    colors: ['#ef4444', '#facc15', '#ffffff', '#3b82f6']
  });

  setTimeout(() => {
    gift.style.display = "none";
    activities.style.display = "block";
  }, 750);
}
</script>

</body>
</html>
