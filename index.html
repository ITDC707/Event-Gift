<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>活動開箱 - 豪華航海版</title>

<style>
  /* --- 豪華背景系統 --- */
  body {
    margin: 0;
    font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
    background-color: #0f2027; 
    /* 疊加深藍漸層與復古紋理 */
    background-image: 
      radial-gradient(circle at center, rgba(44, 83, 100, 0.5) 0%, rgba(15, 32, 39, 0.95) 100%),
      url('https://www.transparenttextures.com/patterns/old-map.png');
    background-attachment: fixed;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 60px 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* --- 復古金色外框 (仿照圖片效果) --- */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    /* 這裡使用精緻的金色雙線邊框 */
    border: 25px solid transparent;
    border-image: linear-gradient(to bottom right, #b8860b, #ffd700, #b8860b) 1;
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  /* --- 四角裝飾光暈 --- */
  .corner-decor {
    position: fixed;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(250, 204, 21, 0.1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }
  .top-left { top: 0; left: 0; }
  .bottom-right { bottom: 0; right: 0; }

  /* --- 背景裝飾元素 --- */
  .bg-decor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .plane { position: absolute; font-size: 55px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); animation: flight 22s linear infinite; z-index: 5; }
  @keyframes flight {
    0% { transform: translate(-15vw, 60vh) rotate(15deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.7; }
    100% { transform: translate(115vw, 10vh) rotate(15deg); opacity: 0; }
  }
  .item { position: absolute; font-size: 90px; filter: opacity(0.15) grayscale(0.5); transition: 0.5s; }
  .globe { top: 10%; left: 8%; }
  .passport { bottom: 12%; left: 10%; }
  .compass { top: 15%; right: 10%; }
  .map { bottom: 10%; right: 8%; }

  /* --- 內容容器 --- */
  .container { text-align: center; max-width: 1250px; width: 100%; z-index: 10; position: relative; }

  /* --- 禮物盒與優化蝴蝶結 --- */
  .gift-box {
    width: 280px; height: 280px; background: #d94141; margin: 60px auto;
    position: relative; border-radius: 45px; cursor: pointer;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .gift-box:hover { transform: scale(1.05); }
  .ribbon-v { position: absolute; width: 55px; height: 100%; background: #facc15; left: 50%; transform: translateX(-50%); z-index: 2; box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
  .ribbon-h { position: absolute; width: 100%; height: 55px; top: 50%; transform: translateY(-50%); background: #facc15; z-index: 1; box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
  .bow { position: absolute; top: -65px; left: 50%; transform: translateX(-50%); width: 220px; height: 120px; z-index: 15; }
  .bow::before, .bow::after { content: ""; position: absolute; width: 130px; height: 130px; background: #facc15; border-radius: 50% 50% 0 50%; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
  .bow::before { left: 0; transform: rotate(-15deg); }
  .bow::after { right: 0; transform: rotate(105deg) scaleX(-1); }
  .bow-center { position: absolute; width: 70px; height: 70px; background: #eab308; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 16; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

  .open { animation: openBox 0.8s forwards; }
  @keyframes openBox { 100% { transform: scale(0) rotate(540deg); opacity: 0; } }

  /* --- 活動卡片區 --- */
  .activities { display: none; flex-wrap: wrap; justify-content: center; align-items: stretch; gap: 40px; animation: fadeIn 1s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

  .title { 
    font-size: 38px; color: #ffd700; margin-bottom: 60px; font-weight: 800; 
    text-shadow: 0 4px 20px rgba(0,0,0,0.8); line-height: 1.5; 
  }

  /* 強化金色雙邊框卡片 */
  .activity-card {
    background: rgba(255, 255, 255, 0.98); color: #1e293b;
    padding: 50px 35px; border-radius: 50px;
    width: 380px; height: auto;
    display: flex; flex-direction: column;
    justify-content: flex-start; align-items: center;
    border: 6px solid #facc15;
    box-shadow: 
      0 0 0 8px white, 
      0 0 0 13px #eab308, 
      0 35px 70px rgba(0,0,0,0.7);
    transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    box-sizing: border-box;
    backdrop-filter: blur(10px);
  }
  .activity-card:hover { transform: translateY(-15px) scale(1.02); box-shadow: 0 0 0 8px white, 0 0 0 15px #ffd700, 0 45px 90px rgba(0,0,0,0.8); }

  .event-date { font-size: 17px; color: #64748b; margin-bottom: 25px; font-weight: 800; letter-spacing: 1px; }
  .activity-card h3 { font-size: 21px; margin: 0 0 25px 0; color: #ef4444; line-height: 1.5; font-weight: 900; }
  .activity-card p { font-size: 16px; color: #334155; line-height: 1.8; margin: 0; font-weight: 500; }
</style>
</head>

<body>

  <div class="corner-decor top-left"></div>
  <div class="corner-decor bottom-right"></div>

  <div class="bg-decor">
    <div class="plane">✈️</div>
    <div class="item globe">🌍</div>
    <div class="item passport">🛂</div>
    <div class="item compass">🧭</div>
    <div class="item map">🗺️</div>
  </div>

  <div class="container">
    <div id="gift" class="gift-box" onclick="openGift()">
      <div class="bow"><div class="bow-center"></div></div>
      <div class="ribbon-v"></div>
      <div class="ribbon-h"></div>
    </div>

    <div id="activities" class="activities">
      <div class="title" style="width: 100%;">✨ 專屬活動推薦<br>Exclusive Event Recommendations ✨</div>
